name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy Pillow ai-edge-litert pytest

      - name: Download BSR model
        run: |
          curl -L 'https://www.dropbox.com/s/cpaon1j1r1yzflx/BirdSquirrelRaccoon_TFLite_model.zip?dl=1' -o bsr_model.zip
          unzip bsr_model.zip -d model_bsr

      - name: Run tests
        run: pytest tests/ -v
